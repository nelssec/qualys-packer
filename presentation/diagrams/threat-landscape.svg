<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <filter id="s" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="550" fill="#f8fafc"/>

  <!-- Title -->
  <rect x="0" y="0" width="1200" height="55" fill="url(#bg1)"/>
  <text x="600" y="35" text-anchor="middle" fill="white" font-size="20" font-weight="bold">The Shift-Left Imperative: Why Scanning in Production Is Too Late</text>

  <!-- The Gap visualization -->
  <rect x="50" y="75" width="1100" height="130" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <text x="600" y="100" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="700">The Attacker-Defender Gap</text>

  <!-- Timeline bar -->
  <rect x="100" y="120" width="1000" height="8" rx="4" fill="#e2e8f0"/>

  <!-- Attacker marker at 5 days -->
  <rect x="145" y="112" width="4" height="24" rx="2" fill="#ef4444"/>
  <rect x="100" y="140" width="95" height="48" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="147" y="160" text-anchor="middle" fill="#991b1b" font-size="18" font-weight="800">5 days</text>
  <text x="147" y="178" text-anchor="middle" fill="#b91c1c" font-size="9" font-weight="600">Time to Exploit</text>

  <!-- Defender marker at 35 days -->
  <rect x="415" y="112" width="4" height="24" rx="2" fill="#f59e0b"/>
  <rect x="365" y="140" width="100" height="48" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="415" y="160" text-anchor="middle" fill="#92400e" font-size="18" font-weight="800">35 days</text>
  <text x="415" y="178" text-anchor="middle" fill="#a16207" font-size="9" font-weight="600">Patch (Internet)</text>

  <!-- Defender marker at 61 days -->
  <rect x="650" y="112" width="4" height="24" rx="2" fill="#ef4444"/>
  <rect x="600" y="140" width="100" height="48" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="650" y="160" text-anchor="middle" fill="#991b1b" font-size="18" font-weight="800">61 days</text>
  <text x="650" y="178" text-anchor="middle" fill="#b91c1c" font-size="9" font-weight="600">Patch (Cloud)</text>

  <!-- Pipeline marker at ~0 -->
  <rect x="104" y="112" width="4" height="24" rx="2" fill="#10b981"/>
  <rect x="60" y="140" width="95" height="48" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="107" y="160" text-anchor="middle" fill="#065f46" font-size="18" font-weight="800">2.2s</text>
  <text x="107" y="178" text-anchor="middle" fill="#047857" font-size="9" font-weight="600">In Pipeline</text>

  <!-- Danger zone -->
  <rect x="149" y="118" width="501" height="4" rx="2" fill="#fca5a5" opacity="0.5"/>
  <text x="400" y="113" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="600">EXPOSURE WINDOW</text>

  <!-- Four stat cards -->
  <rect x="50" y="225" width="260" height="140" rx="12" fill="white" stroke="#fecaca" stroke-width="2" filter="url(#s)"/>
  <text x="180" y="255" text-anchor="middle" fill="#991b1b" font-size="36" font-weight="800">60%</text>
  <text x="180" y="278" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="600">of breaches from known</text>
  <text x="180" y="294" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="600">patchable vulnerabilities</text>
  <text x="180" y="318" text-anchor="middle" fill="#94a3b8" font-size="9">Verizon DBIR 2025</text>
  <text x="180" y="348" text-anchor="middle" fill="#dc2626" font-size="10" font-weight="600">Patches existed. They weren't applied.</text>

  <rect x="335" y="225" width="260" height="140" rx="12" fill="white" stroke="#fed7aa" stroke-width="2" filter="url(#s)"/>
  <text x="465" y="255" text-anchor="middle" fill="#9a3412" font-size="36" font-weight="800">87%</text>
  <text x="465" y="278" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="600">of container images have</text>
  <text x="465" y="294" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="600">critical or high vulnerabilities</text>
  <text x="465" y="318" text-anchor="middle" fill="#94a3b8" font-size="9">Sysdig 2023 Cloud-Native Security Report</text>
  <text x="465" y="348" text-anchor="middle" fill="#ea580c" font-size="10" font-weight="600">Only 15% are in runtime-loaded packages.</text>

  <rect x="620" y="225" width="260" height="140" rx="12" fill="white" stroke="#fde68a" stroke-width="2" filter="url(#s)"/>
  <text x="750" y="255" text-anchor="middle" fill="#92400e" font-size="36" font-weight="800">90%</text>
  <text x="750" y="278" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="600">of cloud resources drift</text>
  <text x="750" y="294" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="600">from secure baseline</text>
  <text x="750" y="318" text-anchor="middle" fill="#94a3b8" font-size="9">CSO Online / CSA 2024</text>
  <text x="750" y="348" text-anchor="middle" fill="#d97706" font-size="10" font-weight="600">IaC scanning catches this at commit.</text>

  <rect x="905" y="225" width="260" height="140" rx="12" fill="white" stroke="#c7d2fe" stroke-width="2" filter="url(#s)"/>
  <text x="1035" y="255" text-anchor="middle" fill="#4338ca" font-size="36" font-weight="800">512K</text>
  <text x="1035" y="278" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="600">malicious packages on</text>
  <text x="1035" y="294" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="600">open-source registries in 2024</text>
  <text x="1035" y="318" text-anchor="middle" fill="#94a3b8" font-size="9">Sonatype 2024 State of Software Supply Chain</text>
  <text x="1035" y="348" text-anchor="middle" fill="#6366f1" font-size="10" font-weight="600">156% increase year-over-year.</text>

  <!-- Cost comparison bar -->
  <rect x="50" y="390" width="1100" height="140" rx="12" fill="#1e293b" filter="url(#s)"/>
  <text x="600" y="418" text-anchor="middle" fill="white" font-size="14" font-weight="700">Cost to Fix: Where You Find It Matters</text>

  <!-- Design bar -->
  <rect x="80" y="435" width="80" height="30" rx="4" fill="#10b981"/>
  <text x="120" y="455" text-anchor="middle" fill="white" font-size="11" font-weight="700">$80</text>
  <text x="120" y="480" text-anchor="middle" fill="#94a3b8" font-size="10">Design</text>

  <!-- Development bar -->
  <rect x="80" y="435" width="200" height="30" rx="4" fill="#3b82f6" opacity="0.7"/>
  <rect x="80" y="435" width="80" height="30" rx="4" fill="#10b981"/>
  <text x="230" y="455" text-anchor="middle" fill="white" font-size="11" font-weight="700">$520</text>
  <text x="230" y="480" text-anchor="middle" fill="#94a3b8" font-size="10">Development</text>

  <!-- Testing bar -->
  <rect x="80" y="435" width="400" height="30" rx="4" fill="#f59e0b" opacity="0.7"/>
  <rect x="80" y="435" width="200" height="30" rx="4" fill="#3b82f6" opacity="0.7"/>
  <rect x="80" y="435" width="80" height="30" rx="4" fill="#10b981"/>
  <text x="380" y="455" text-anchor="middle" fill="white" font-size="11" font-weight="700">$1,200</text>
  <text x="380" y="480" text-anchor="middle" fill="#94a3b8" font-size="10">Testing</text>

  <!-- Production bar -->
  <rect x="80" y="435" width="1040" height="30" rx="4" fill="#ef4444" opacity="0.6"/>
  <rect x="80" y="435" width="400" height="30" rx="4" fill="#f59e0b" opacity="0.7"/>
  <rect x="80" y="435" width="200" height="30" rx="4" fill="#3b82f6" opacity="0.7"/>
  <rect x="80" y="435" width="80" height="30" rx="4" fill="#10b981"/>
  <text x="900" y="455" text-anchor="middle" fill="white" font-size="16" font-weight="800">$7,600</text>
  <text x="900" y="480" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">Production (95x)</text>

  <!-- Pipeline marker -->
  <rect x="80" y="500" width="200" height="22" rx="4" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="180" y="515" text-anchor="middle" fill="#10b981" font-size="10" font-weight="700">Pipeline scanning catches it here</text>

  <!-- NIST source -->
  <text x="1100" y="520" text-anchor="end" fill="#64748b" font-size="9">Source: NIST / Capers Jones analysis of 12,000+ projects</text>
</svg>
