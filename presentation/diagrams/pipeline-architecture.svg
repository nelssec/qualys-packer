<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="iacGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="containerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="amiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="failGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="#f8fafc"/>

  <!-- Title -->
  <rect x="0" y="0" width="1200" height="60" fill="url(#headerGrad)"/>
  <text x="600" y="38" text-anchor="middle" fill="white" font-size="22" font-weight="bold">Shift-Left Security Pipeline: From Source Code to Golden AMI</text>

  <!-- Developer -->
  <rect x="30" y="280" width="120" height="100" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
  <text x="90" y="320" text-anchor="middle" fill="#1e293b" font-size="28">👨‍💻</text>
  <text x="90" y="348" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="600">Developer</text>
  <text x="90" y="365" text-anchor="middle" fill="#64748b" font-size="10">git push / PR</text>

  <!-- Arrow from developer -->
  <line x1="150" y1="330" x2="195" y2="330" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>
  <defs><marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/></marker></defs>

  <!-- CI/CD Pipeline Box -->
  <rect x="200" y="80" width="760" height="520" rx="16" fill="white" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
  <rect x="200" y="80" width="760" height="40" rx="16" fill="#1e293b"/>
  <rect x="200" y="104" width="760" height="16" fill="#1e293b"/>
  <text x="580" y="106" text-anchor="middle" fill="white" font-size="14" font-weight="600">CI/CD Pipeline (GitHub Actions / Jenkins / GitLab CI)</text>

  <!-- Four scan lanes -->

  <!-- Lane 1: Code Scan -->
  <rect x="220" y="135" width="170" height="200" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <rect x="220" y="135" width="170" height="35" rx="10" fill="url(#codeGrad)"/>
  <rect x="220" y="155" width="170" height="15" fill="url(#codeGrad)"/>
  <text x="305" y="158" text-anchor="middle" fill="white" font-size="12" font-weight="600">Code Scan (SCA)</text>
  <text x="305" y="190" text-anchor="middle" fill="#4338ca" font-size="11" font-weight="600">Source Code</text>
  <text x="305" y="208" text-anchor="middle" fill="#64748b" font-size="10">Dependencies</text>
  <text x="305" y="222" text-anchor="middle" fill="#64748b" font-size="10">Open-source libs</text>
  <text x="305" y="236" text-anchor="middle" fill="#64748b" font-size="10">Lock files</text>
  <rect x="240" y="252" width="130" height="24" rx="4" fill="#c7d2fe"/>
  <text x="305" y="268" text-anchor="middle" fill="#4338ca" font-size="10" font-weight="600">SBOM + SARIF</text>
  <rect x="240" y="282" width="130" height="24" rx="4" fill="#ddd6fe"/>
  <text x="305" y="298" text-anchor="middle" fill="#6d28d9" font-size="10" font-weight="600">Vuln Report</text>

  <!-- Lane 2: IaC Scan -->
  <rect x="405" y="135" width="170" height="200" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
  <rect x="405" y="135" width="170" height="35" rx="10" fill="url(#iacGrad)"/>
  <rect x="405" y="155" width="170" height="15" fill="url(#iacGrad)"/>
  <text x="490" y="158" text-anchor="middle" fill="white" font-size="12" font-weight="600">IaC Scan</text>
  <text x="490" y="190" text-anchor="middle" fill="#92400e" font-size="11" font-weight="600">Terraform / CFN</text>
  <text x="490" y="208" text-anchor="middle" fill="#64748b" font-size="10">Misconfigurations</text>
  <text x="490" y="222" text-anchor="middle" fill="#64748b" font-size="10">Policy violations</text>
  <text x="490" y="236" text-anchor="middle" fill="#64748b" font-size="10">CIS Benchmarks</text>
  <rect x="425" y="252" width="130" height="24" rx="4" fill="#fde68a"/>
  <text x="490" y="268" text-anchor="middle" fill="#92400e" font-size="10" font-weight="600">Policy Pass/Fail</text>
  <rect x="425" y="282" width="130" height="24" rx="4" fill="#fcd34d"/>
  <text x="490" y="298" text-anchor="middle" fill="#78350f" font-size="10" font-weight="600">SARIF Report</text>

  <!-- Lane 3: Container Scan -->
  <rect x="590" y="135" width="170" height="200" rx="10" fill="#ecfeff" stroke="#a5f3fc" stroke-width="1.5"/>
  <rect x="590" y="135" width="170" height="35" rx="10" fill="url(#containerGrad)"/>
  <rect x="590" y="155" width="170" height="15" fill="url(#containerGrad)"/>
  <text x="675" y="158" text-anchor="middle" fill="white" font-size="12" font-weight="600">Container Scan</text>
  <text x="675" y="190" text-anchor="middle" fill="#155e75" font-size="11" font-weight="600">Docker / OCI Images</text>
  <text x="675" y="208" text-anchor="middle" fill="#64748b" font-size="10">OS packages</text>
  <text x="675" y="222" text-anchor="middle" fill="#64748b" font-size="10">Language deps</text>
  <text x="675" y="236" text-anchor="middle" fill="#64748b" font-size="10">Secrets detection</text>
  <rect x="610" y="252" width="130" height="24" rx="4" fill="#a5f3fc"/>
  <text x="675" y="268" text-anchor="middle" fill="#155e75" font-size="10" font-weight="600">SBOM + SARIF</text>
  <rect x="610" y="282" width="130" height="24" rx="4" fill="#67e8f9"/>
  <text x="675" y="298" text-anchor="middle" fill="#0e7490" font-size="10" font-weight="600">Vuln Report</text>

  <!-- Lane 4: Golden AMI Scan -->
  <rect x="775" y="135" width="170" height="200" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
  <rect x="775" y="135" width="170" height="35" rx="10" fill="url(#amiGrad)"/>
  <rect x="775" y="155" width="170" height="15" fill="url(#amiGrad)"/>
  <text x="860" y="158" text-anchor="middle" fill="white" font-size="12" font-weight="600">Golden AMI Scan</text>
  <text x="860" y="190" text-anchor="middle" fill="#065f46" font-size="11" font-weight="600">Packer + QScanner</text>
  <text x="860" y="208" text-anchor="middle" fill="#64748b" font-size="10">OS packages (291)</text>
  <text x="860" y="222" text-anchor="middle" fill="#64748b" font-size="10">Language deps (48)</text>
  <text x="860" y="236" text-anchor="middle" fill="#64748b" font-size="10">FileInsight (2)</text>
  <rect x="795" y="252" width="130" height="24" rx="4" fill="#6ee7b7"/>
  <text x="860" y="268" text-anchor="middle" fill="#065f46" font-size="10" font-weight="600">SBOM + SARIF</text>
  <rect x="795" y="282" width="130" height="24" rx="4" fill="#34d399"/>
  <text x="860" y="298" text-anchor="middle" fill="#064e3b" font-size="10" font-weight="600">30 Vulns Found</text>

  <!-- Policy Gate -->
  <rect x="280" y="360" width="600" height="50" rx="8" fill="#1e293b" filter="url(#shadow)"/>
  <text x="580" y="390" text-anchor="middle" fill="white" font-size="14" font-weight="700">POLICY GATE: evaluate-policy</text>
  <text x="460" y="390" text-anchor="middle" fill="#4ade80" font-size="14">&#9679;</text>
  <text x="468" y="390" text-anchor="start" fill="#4ade80" font-size="11">ALLOW (exit 0)</text>
  <text x="660" y="390" text-anchor="middle" fill="#f87171" font-size="14">&#9679;</text>
  <text x="668" y="390" text-anchor="start" fill="#f87171" font-size="11">DENY (exit 42)</text>
  <text x="790" y="390" text-anchor="middle" fill="#fbbf24" font-size="14">&#9679;</text>
  <text x="798" y="390" text-anchor="start" fill="#fbbf24" font-size="11">AUDIT (exit 43)</text>

  <!-- Arrows down from lanes to gate -->
  <line x1="305" y1="335" x2="305" y2="360" stroke="#6366f1" stroke-width="2"/>
  <line x1="490" y1="335" x2="490" y2="360" stroke="#f59e0b" stroke-width="2"/>
  <line x1="675" y1="335" x2="675" y2="360" stroke="#06b6d4" stroke-width="2"/>
  <line x1="860" y1="335" x2="860" y2="360" stroke="#10b981" stroke-width="2"/>

  <!-- Pass path -->
  <line x1="480" y1="410" x2="480" y2="460" stroke="#4ade80" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <defs><marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4ade80"/></marker></defs>

  <!-- Fail path -->
  <line x1="680" y1="410" x2="680" y2="460" stroke="#f87171" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <defs><marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#f87171"/></marker></defs>

  <!-- Pass: Artifact created -->
  <rect x="350" y="460" width="260" height="55" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="484" text-anchor="middle" fill="#065f46" font-size="13" font-weight="700">Artifact Created</text>
  <text x="480" y="502" text-anchor="middle" fill="#047857" font-size="10">AMI / Image / Module deployed</text>

  <!-- Fail: Build blocked -->
  <rect x="550" y="460" width="260" height="55" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="680" y="484" text-anchor="middle" fill="#991b1b" font-size="13" font-weight="700">Build Blocked</text>
  <text x="680" y="502" text-anchor="middle" fill="#b91c1c" font-size="10">Nothing deployed. Fix at the keyboard.</text>

  <!-- Output artifacts row -->
  <rect x="220" y="540" width="725" height="45" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="235" y="567" fill="#475569" font-size="11" font-weight="600">Artifacts:</text>
  <rect x="310" y="549" width="80" height="26" rx="4" fill="#e0e7ff"/>
  <text x="350" y="566" text-anchor="middle" fill="#4338ca" font-size="10" font-weight="600">SARIF</text>
  <rect x="400" y="549" width="120" height="26" rx="4" fill="#e0e7ff"/>
  <text x="460" y="566" text-anchor="middle" fill="#4338ca" font-size="10" font-weight="600">SBOM (SPDX)</text>
  <rect x="530" y="549" width="130" height="26" rx="4" fill="#e0e7ff"/>
  <text x="595" y="566" text-anchor="middle" fill="#4338ca" font-size="10" font-weight="600">SBOM (CycloneDX)</text>
  <rect x="670" y="549" width="100" height="26" rx="4" fill="#e0e7ff"/>
  <text x="720" y="566" text-anchor="middle" fill="#4338ca" font-size="10" font-weight="600">Vuln Reports</text>
  <rect x="780" y="549" width="80" height="26" rx="4" fill="#e0e7ff"/>
  <text x="820" y="566" text-anchor="middle" fill="#4338ca" font-size="10" font-weight="600">JSON</text>
  <rect x="870" y="549" width="60" height="26" rx="4" fill="#e0e7ff"/>
  <text x="900" y="566" text-anchor="middle" fill="#4338ca" font-size="10" font-weight="600">Table</text>

  <!-- Central dashboard -->
  <rect x="990" y="250" width="180" height="120" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
  <text x="1080" y="290" text-anchor="middle" fill="#1e293b" font-size="28">📊</text>
  <text x="1080" y="315" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="700">Central Dashboard</text>
  <text x="1080" y="332" text-anchor="middle" fill="#64748b" font-size="10">Single pane of glass</text>
  <text x="1080" y="348" text-anchor="middle" fill="#64748b" font-size="10">All artifact types</text>
  <text x="1080" y="364" text-anchor="middle" fill="#64748b" font-size="10">All environments</text>

  <!-- Arrow from pipeline to dashboard -->
  <line x1="960" y1="310" x2="990" y2="310" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Footer stats -->
  <rect x="0" y="630" width="1200" height="70" fill="url(#headerGrad)"/>
  <text x="150" y="660" text-anchor="middle" fill="#94a3b8" font-size="10">TIME TO EXPLOIT</text>
  <text x="150" y="680" text-anchor="middle" fill="#f87171" font-size="18" font-weight="700">5 days</text>
  <text x="400" y="660" text-anchor="middle" fill="#94a3b8" font-size="10">TIME TO PATCH (PRODUCTION)</text>
  <text x="400" y="680" text-anchor="middle" fill="#fbbf24" font-size="18" font-weight="700">35-61 days</text>
  <text x="650" y="660" text-anchor="middle" fill="#94a3b8" font-size="10">TIME TO SCAN (IN PIPELINE)</text>
  <text x="650" y="680" text-anchor="middle" fill="#4ade80" font-size="18" font-weight="700">2.2 seconds</text>
  <text x="950" y="660" text-anchor="middle" fill="#94a3b8" font-size="10">VULN REDUCTION (SHIFT-LEFT)</text>
  <text x="950" y="680" text-anchor="middle" fill="#4ade80" font-size="18" font-weight="700">up to 45%</text>
</svg>
