name: Build Golden AMI

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      os_target:
        description: 'OS target variable file'
        required: true
        default: 'amazon-linux-2023'
        type: choice
        options:
          - amazon-linux-2023
          - ubuntu-2404
      qualys_mode:
        description: 'QScanner scan mode'
        required: true
        default: 'get-report'
        type: choice
        options:
          - get-report
          - evaluate-policy
          - scan-only
          - inventory-only

env:
  AWS_DEFAULT_REGION: us-east-1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-packer@main

      - name: Packer Init
        run: packer init packer/

      - name: Build Golden AMI
        run: |
          packer build \
            -var-file=packer/${{ github.event.inputs.os_target || 'amazon-linux-2023' }}.pkrvars.hcl \
            -var "qualys_mode=${{ github.event.inputs.qualys_mode || 'get-report' }}" \
            packer/
        env:
          QUALYS_ACCESS_TOKEN: ${{ secrets.QUALYS_ACCESS_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qscanner-results-${{ github.event.inputs.os_target || 'amazon-linux-2023' }}
          path: output/
